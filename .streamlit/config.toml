# Assay Audit Bench — certificate-light theme, matched to the deck.
# Spectral (document-of-record serif) + JetBrains Mono (data/verdicts).
[theme]
base = "light"
primaryColor = "#2e44c9"               # brand indigo-blue (white button text contrasts)
backgroundColor = "#fdfdfb"            # paper
secondaryBackgroundColor = "#f3f3f0"   # inset
textColor = "#23262e"                  # ink
linkColor = "#2e44c9"
borderColor = "#d6d8da"
greenColor = "#1a7f37"                 # AUDIT: PASS
redColor = "#cf222e"                   # AUDIT: FAIL
baseRadius = "small"
linkUnderline = false
font = "Spectral:https://fonts.googleapis.com/css2?family=Spectral:wght@300;400;500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
